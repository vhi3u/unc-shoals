# ═══════════════════════════════════════════════════════════════════════════
# Parameter Sweep Configuration
# ═══════════════════════════════════════════════════════════════════════════
#
# Each [[runs]] entry defines one simulation.
# The PBS job array index (1-based) maps to the order of entries here.
#
# Parameters:
#   Hs            - Shoal height above shelf [m]
#   shoal_length  - Horizontal extent of the shoal ridge [m]
#   run_label     - A short label for output directory naming
# ═══════════════════════════════════════════════════════════════════════════

# ── Shoal Height Sweep (Ls = 20 km fixed) ──────────────────────────────
[[runs]]
run_label     = "Hs05_Ls20k"
Hs            = 5.0
shoal_length  = 20000.0

[[runs]]
run_label     = "Hs10_Ls20k"
Hs            = 10.0
shoal_length  = 20000.0

[[runs]]
run_label     = "Hs15_Ls20k"
Hs            = 15.0
shoal_length  = 20000.0

# ── Shoal Length Sweep (Hs = 15 m fixed) ───────────────────────────────
# Note: Hs15_Ls20k already covered above

[[runs]]
run_label     = "Hs15_Ls30k"
Hs            = 15.0
shoal_length  = 30000.0

[[runs]]
run_label     = "Hs15_Ls40k"
Hs            = 15.0
shoal_length  = 40000.0
